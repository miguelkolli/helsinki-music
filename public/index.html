<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Helsinki Music Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0e0f11;--bg2:#16181c;--bg3:#1e2026;--bg4:#25272e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0ee;--text2:#8a8c92;--text3:#50535c;
  --green:#1D9E75;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}

.banner{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:7px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.logo-dot.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.banner-sub{font-size:12px;color:var(--text2);margin-left:4px}
.banner-right{display:flex;gap:8px;align-items:center}
.banner-right input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text);font-family:inherit;font-size:13px;width:200px}
.banner-right input::placeholder{color:var(--text3)}
.banner-right input:focus{outline:none;border-color:rgba(255,255,255,.22)}
.btn{font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;transition:background .1s}
.btn:hover{background:var(--bg3)}

.stats-strip{display:flex;gap:6px;flex-wrap:wrap;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2)}
.stat-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.stat-pill b{color:var(--text);font-weight:500}

.main{padding:1.25rem 1.5rem}
.venue-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
@media(max-width:580px){.venue-grid{grid-template-columns:1fr}}

.venue-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
.venue-card:hover{border-color:var(--border2)}
.venue-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.venue-name{font-size:13px;font-weight:600;letter-spacing:-.01em}
.venue-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--bg3);color:var(--text2);font-family:'Space Mono',monospace}

.event-list{padding:.25rem 0}
.event-row{padding:.5rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:block}
.event-row:last-child{border-bottom:none}
.event-row:hover{background:var(--bg3)}
.erow-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.etitle{font-size:12px;font-weight:500;line-height:1.3;flex:1;color:var(--text)}
.price-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(29,158,117,.18);color:#4fd4a8;font-weight:600;white-space:nowrap;flex-shrink:0}
.free-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(29,158,117,.28);color:#4fd4a8;font-weight:700;white-space:nowrap;flex-shrink:0}
.edate{font-size:10px;color:var(--text2);margin-top:3px;font-family:'Space Mono',monospace}
.etags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.etag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg4);color:var(--text3)}
.more-row{padding:.5rem 1rem;font-size:11px;color:var(--text3);border-top:1px solid var(--border);cursor:pointer}
.more-row:hover{color:var(--text2)}
.no-events{padding:1rem;font-size:12px;color:var(--text3);text-align:center}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;flex-wrap:wrap;gap:8px}
.page-info{font-size:12px;color:var(--text2)}
.page-ctrl{display:flex;align-items:center;gap:10px}
.page-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);font-size:22px;display:flex;align-items:center;justify-content:center;transition:background .1s;line-height:1}
.page-btn:hover{background:var(--bg3)}
.page-btn:disabled{opacity:.22;cursor:default;pointer-events:none}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .15s}
.dot.active{background:var(--green);width:18px;border-radius:3px}
.page-total{font-size:11px;color:var(--text3);font-family:'Space Mono',monospace}
.state-msg{grid-column:1/-1;text-align:center;padding:3rem;color:var(--text2);font-size:13px;font-family:'Space Mono',monospace}
</style>
</head>
<body>

<header class="banner">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo"><div class="logo-dot pulse" id="logo-dot"></div>helsinki_music</div>
    <span class="banner-sub" id="banner-sub">Loading…</span>
  </div>
  <div class="banner-right">
    <input type="text" id="search" placeholder="Search venue or event… ( / )" oninput="onSearch()"/>
    <button class="btn" onclick="loadEvents()">Refresh</button>
    <button class="btn" onclick="window.open('/api/export','_blank')">Export</button>
  </div>
</header>

<div class="stats-strip" id="stats-strip"></div>

<div class="main">
  <div class="venue-grid" id="grid">
    <div class="state-msg">Connecting to server…</div>
  </div>
  <div class="pagination">
    <div class="page-info" id="page-info">Page 1</div>
    <div class="page-ctrl">
      <button class="page-btn" id="btn-prev" onclick="changePage(-1)" disabled>&#8249;</button>
      <div class="dots" id="dots"></div>
      <button class="page-btn" id="btn-next" onclick="changePage(1)">&#8250;</button>
    </div>
    <div class="page-total" id="page-total"></div>
  </div>
</div>

<script>
const PER_PAGE = 4;
let allEvents   = [];
let venueMap    = new Map();
let pages       = [];
let currentPage = 0;
let searchQuery = '';

// ── load from server API ─────────────────────────────
async function loadEvents() {
  setDot(true);
  setText('Fetching…');
  try {
    const r = await fetch('/api/events?limit=1000');
    if (!r.ok) throw new Error('server');
    const d = await r.json();
    allEvents = (d.events||[]).map(e=>({
      ...e,
      date_iso: e.date_iso||e.date||null,
      tags: Array.isArray(e.tags)?e.tags:JSON.parse(e.tags||'[]'),
    }));
    if (allEvents.length === 0) throw new Error('empty');
    build();
  } catch(_) {
    // fallback — fetch LinkedEvents directly
    await loadLinkedEvents();
  }
}

// ── direct LinkedEvents fallback ─────────────────────
async function loadLinkedEvents() {
  const KW = ['music','concert','gig','jazz','rock','pop','electronic','folk','metal','blues','indie','choir','orchestra','band','festival','live','techno','soul','classical','musiikki','keikka'];
  const today  = new Date().toISOString().split('T')[0];
  const future = new Date(Date.now()+180*864e5).toISOString().split('T')[0];
  let url = `https://api.hel.fi/linkedevents/v1/event/?start=${today}&end=${future}&keyword=yso:p1808&page_size=100&sort=start_time&include=location,keywords,offers`;
  allEvents = [];
  try {
    while (url) {
      const r = await fetch(url);
      const d = await r.json();
      (d.data||[]).forEach(raw=>{
        const name = raw.name?.en||raw.name?.fi||'';
        if (!name) return;
        const t = (name+' '+(raw.keywords||[]).map(k=>k.name?.en||'').join(' ')).toLowerCase();
        if (!KW.some(k=>t.includes(k))) return;
        const offer  = (raw.offers||[])[0];
        const isFree = offer?.is_free===true;
        allEvents.push({
          id:       raw.id,
          name,
          venue:    raw.location?.name?.en||raw.location?.name?.fi||'Helsinki',
          date_iso: raw.start_time||null,
          tags:     (raw.keywords||[]).map(k=>k.name?.en||k.name?.fi||'').filter(Boolean).slice(0,3),
          isFree,
          price:    isFree?'Free':(offer?.price?.en||offer?.price?.fi||null),
          url:      raw.info_url?.en||raw.info_url?.fi||null,
        });
      });
      url = d.next||null;
      setText(`Fetching… ${allEvents.length}`);
      if (url) await new Promise(r=>setTimeout(r,80));
    }
  } catch(_) {}
  build();
}

// ── build venue map + paginate ────────────────────────
function build() {
  venueMap = new Map();
  const q = searchQuery.toLowerCase();
  allEvents.forEach(e=>{
    const v = e.venue||'Helsinki';
    if (q && !e.name.toLowerCase().includes(q) && !v.toLowerCase().includes(q)) return;
    if (!venueMap.has(v)) venueMap.set(v,[]);
    venueMap.get(v).push(e);
  });
  venueMap.forEach((evs,v)=>venueMap.set(v,evs.sort((a,b)=>new Date(a.date_iso||0)-new Date(b.date_iso||0))));
  const sorted = [...venueMap.entries()].sort((a,b)=>b[1].length-a[1].length);
  pages = [];
  for (let i=0;i<sorted.length;i+=PER_PAGE) pages.push(sorted.slice(i,i+PER_PAGE));
  currentPage = 0;
  renderStats();
  renderPage();
  setDot(false);
}

// ── stats strip ───────────────────────────────────────
function renderStats() {
  const now  = Date.now();
  const week = now+7*864e5;
  const free = allEvents.filter(e=>e.isFree).length;
  const wk   = allEvents.filter(e=>{const d=new Date(e.date_iso||0).getTime();return d>=now&&d<=week;}).length;
  setText(`${allEvents.length} events · ${venueMap.size} venues`);
  document.getElementById('stats-strip').innerHTML=[
    `<div class="stat-pill"><b>${allEvents.length}</b> total</div>`,
    `<div class="stat-pill"><b>${venueMap.size}</b> venues</div>`,
    `<div class="stat-pill"><b>${wk}</b> this week</div>`,
    `<div class="stat-pill"><b>${free}</b> free</div>`,
    `<div class="stat-pill"><b>${pages.length}</b> pages</div>`,
  ].join('');
}

// ── render current page ───────────────────────────────
function renderPage() {
  const grid = document.getElementById('grid');
  if (!pages.length) {
    grid.innerHTML = '<div class="state-msg">No venues found</div>';
    renderPagination(); return;
  }
  grid.innerHTML = pages[currentPage].map(([venue,events])=>{
    const rows = events.slice(0,5).map(e=>{
      const dt = e.date_iso?new Date(e.date_iso):null;
      const ds = dt&&!isNaN(dt)
        ? dt.toLocaleDateString('en-FI',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
        : 'TBA';
      const pt = e.isFree?`<span class="free-tag">Free</span>`:e.price?`<span class="price-tag">${e.price}</span>`:'';
      const tg = (e.tags||[]).slice(0,2).map(t=>`<span class="etag">${t}</span>`).join('');
      const lk = e.url?`href="${e.url}" target="_blank" rel="noopener"`:`href="javascript:void(0)" onclick="askAbout('${e.name.replace(/'/g,'&#39;').slice(0,50)}','${venue.replace(/'/g,'&#39;')}')"`;
      return `<a class="event-row" ${lk}>
        <div class="erow-top"><span class="etitle">${e.name}</span>${pt}</div>
        <div class="edate">${ds}</div>
        ${tg?`<div class="etags">${tg}</div>`:''}
      </a>`;
    }).join('');
    const extra = events.length-5;
    const more  = extra>0?`<div class="more-row" onclick="filterVenue('${venue.replace(/'/g,'&#39;')}')">+${extra} more events ›</div>`:'';
    return `<div class="venue-card">
      <div class="venue-header">
        <span class="venue-name">${venue}</span>
        <span class="venue-badge">${events.length}</span>
      </div>
      <div class="event-list">${rows}${more}</div>
    </div>`;
  }).join('');
  renderPagination();
}

function renderPagination() {
  const total = pages.length;
  document.getElementById('page-info').textContent  = `Page ${currentPage+1} of ${Math.max(1,total)}`;
  document.getElementById('page-total').textContent = `${venueMap.size} venues`;
  document.getElementById('btn-prev').disabled = currentPage===0;
  document.getElementById('btn-next').disabled = currentPage>=total-1;
  const show = Math.min(total,10);
  document.getElementById('dots').innerHTML = Array.from({length:show},(_,i)=>
    `<div class="dot${i===currentPage?' active':''}" onclick="goPage(${i})"></div>`
  ).join('');
}

function changePage(dir){
  currentPage=Math.max(0,Math.min(pages.length-1,currentPage+dir));
  renderPage();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goPage(n){currentPage=n;renderPage();window.scrollTo({top:0,behavior:'smooth'});}

function onSearch(){
  searchQuery=document.getElementById('search').value.trim();
  build();
}
function filterVenue(v){
  document.getElementById('search').value=v;
  searchQuery=v;build();
}
function askAbout(name,venue){
  window.open(`/api/events?q=${encodeURIComponent(name)}`,'_blank');
}

function setText(t){document.getElementById('banner-sub').textContent=t;}
function setDot(on){
  const d=document.getElementById('logo-dot');
  d.className='logo-dot'+(on?' pulse':'');
}

// keyboard: "/" focuses search
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){
    e.preventDefault();document.getElementById('search').focus();
  }
  if(e.key==='ArrowRight') changePage(1);
  if(e.key==='ArrowLeft')  changePage(-1);
});

// auto-refresh every 60s
setInterval(async()=>{
  try{
    const r=await fetch('/api/stats');
    const d=await r.json();
    if(d.total>allEvents.length) loadEvents();
  }catch(_){}
},60000);

loadEvents();
</script>
</body>
</html>
